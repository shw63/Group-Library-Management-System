<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-aFq/bzH65dt+w6FI2ooMVUpc+21e0SRygnTpmBvdBgSdnuTN7QbdgL+OapgHtvPp" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>

    <header class="bg-dark text-white py-1 mb-5">
        <div class="container-fluid px-4">
            <div class="row align-items-center">
                <!--Title of Page-->
                <div class="col-auto">
                    <h1 class="mb-0 h3">Library<br>Management<br>System</h1>
                </div>
                
                <div class="col px-4">
                    
                    <!-- Search and Sort controls--> 
                    <section id="controls">
                        <h2 class="h5">Browse Books</h2>
                        <div class="input-group input-group-lg">
                            <!-- User input here to dynamically filter books -->
                            <input type="text" id="searchBar" class="form-control" placeholder="Search by title, author, or genre">

                            <!-- Sorting Dropdown -->
                            <!-- JS provides detection for selected option and sorts -->
                            <select id="sortSelect">
                                <!-- Sorting options for title, author, or genre -->
                                <option value="title">Sort by Title</option>
                                <option value="author">Sort by Author</option>
                                <option value="genre">Sort by Genre</option>
                            </select>
                        </div>
                    </section>

                    
                </div>

                <div class="col-auto">
                    <!-- Dashboard -->
                    <section id="dashboard">
                        <h2 class="h5">Library Dashboard</h2>
                        <!-- container for the book stats -->
                        <div class="stats">
                            <!-- number of total books, borrowed books, and overdue books -->
                            <p id="totalBooks">Total Books: 0</p>
                            <p id="borrowedCount">Borrowed Books: 0</p>
                            <p id="overdueCount">Overdue Books: 0</p>
                        </div>
                    </section>

                </div>

            </div>
        </div>
        
    </header>

    

    
    <main class="container">
        <!-- Book List -->
        <section id="bookSection" class="browse-wrapper p-5 rounded-4 shadow-sm mb-5">
            <h2 class="mb-4">Available Books</h2>
            <!-- Container where JS will insert books dynamically -->
            <div id="bookList">
                <div class = "container">
                    <div class = "row browseRow">

                    </div>
                </div>
            </div>

            <!-- possible structure for the book cards (FOR SHEA) -->
            <!--
            <div class="book-card">
                <h3>Book Title</h3>
                <p>Author Name</p>
                <p>Genre</p>
                <button>Borrow</button>
            </div>
            -->


        </section>

        <!-- Borrowed Books -->
        <section id="borrowedSection">
            <h2>Borrowed Books</h2>
            <!-- Container for borrowed books to be displayed -->
            <div id="borrowedBooks">
                <div class = "container">
                    <div class = "row borrowedfRow">

                    </div>
                </div>
            </div>
            </div>

            <!-- possible structure again -->
            <!--
            <div class="book-card borrowed">
                <h3>Book Title</h3>
                <p>Due Date: 2026-04-20</p>
                <button>Return</button>
            </div>
            -->

        </section>
    </main>
<!-- bootstrap include -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"
integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe"
crossorigin="anonymous"></script>
</body>
</html>
